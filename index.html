<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/scr/style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div>
      <div>
        <h1 class="sumScreen" id="sum-screen">__</h1>
      </div>
      <div class="firstRow" id="first-row">
        <button class="one" id="one-1">1</button>
        <button class="two" id="two-2">2</button>
        <button class="three" id="three-3">3</button>
        <button class="equal" id="equal">=</button>
      </div>
      <div class="secondRow" id="second-row">
        <button class="seven" id="seven-7">7</button>
        <button class="eight" id="eight-8">8</button>
        <button class="nine" id="nine-9">9</button>
        <button class="multiply" id="multiply">x</button>
      </div>
      <div class="thirdRow" id="third-row">
        <button class="four" id="four-4">4</button>
        <button class="five" id="five-5">5</button>
        <button class="six" id="six-6">6</button>
        <button class="subtract" id="subtract">-</button>
      </div>
      <div class="fourthRow" id="fourth-row">
        <button class="four" id="four-4">4</button>
        <button class="five" id="five-5">5</button>
        <button class="six" id="six-6">6</button>
        <button class="add" id="add">+</button>
      </div>
      <div class="fifthRow" id="fifth-row">
        <button class="clear" id="clear">C</button>
        <button class="zero" id="zero">0</button>
        <button class="period" id="period">.</button>
        <button class="divide" id="divide">÷</button>
      </div>
    </div>
  </body>
</html>
